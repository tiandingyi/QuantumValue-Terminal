name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.1"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Python service dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r services/python-engine/requirements.txt -r services/python-engine/requirements-dev.txt

      - name: Validate Docker Compose syntax
        run: |
          docker compose --env-file .env.docker-compose config > /dev/null

      - name: Run tests
        run: pnpm test

      - name: Run lint checks
        run: pnpm lint

      - name: Run build checks
        run: pnpm build
