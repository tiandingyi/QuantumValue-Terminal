version: "2"
sql:
  - engine: "postgresql"
    schema:
      - "../../db/migrations/000001_init.up.sql"
      - "../../db/migrations/000002_jsonb_persistence.up.sql"
    queries:
      - "internal/db/queries"
    gen:
      go:
        package: "sqlc"
        out: "internal/db/sqlc"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: true
        emit_empty_slices: true
